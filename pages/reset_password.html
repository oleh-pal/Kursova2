<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скидання пароля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/reset-password.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>

        <h2 class="page-title">Створення нового пароля</h2>
        <p class="page-subtitle">Введіть новий пароль для вашого облікового запису</p>

        <form id="resetPasswordForm" onsubmit="resetPassword(event)">
            <div class="form-group">
                <label for="newPassword" class="form-label">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Новий пароль
                </label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        id="newPassword" 
                        class="form-input" 
                        placeholder="Введіть новий пароль"
                        minlength="6"
                        required>
                    <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <small class="form-hint">Мінімум 6 символів</small>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Підтвердження пароля
                </label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-input" 
                        placeholder="Повторіть новий пароль"
                        minlength="6"
                        required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <small id="passwordMatchError" class="form-error" style="display: none;">Паролі не співпадають</small>
            </div>

            <div class="password-strength">
                <div class="strength-label">Надійність пароля:</div>
                <div class="strength-bar-container">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
                <div id="strengthText" class="strength-text">—</div>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Скинути пароль
            </button>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <h3>Пароль успішно змінено!</h3>
            <p>Тепер ви можете увійти в систему з новим паролем</p>
            <a href="home.html" class="btn-success">Перейти до входу</a>
        </div>
    </div>

    <script>
        const API_URL_GLOB = "http://localhost:8080/api/v1";
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showNotification("Невірне посилання для скидання пароля", "error");
            setTimeout(() => window.location.href = "forgot_password.html", 2000);
        }

        document.getElementById("newPassword").addEventListener("input", function(e) {
            checkPasswordStrength(e.target.value);
            checkPasswordMatch();
        });

        document.getElementById("confirmPassword").addEventListener("input", checkPasswordMatch);

        function checkPasswordStrength(password) {
            const strengthBar = document.getElementById("strengthBar");
            const strengthText = document.getElementById("strengthText");
            let strength = 0, text = "", color = "";

            if (password.length === 0) {
                strengthBar.style.width = "0%";
                strengthText.textContent = "—";
                return;
            }

            if (password.length >= 6) strength += 25;
            if (password.length >= 8) strength += 25;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password)) strength += 25;

            if (strength <= 25) { text = "Слабкий"; color = "#dc3545"; }
            else if (strength <= 50) { text = "Середній"; color = "#ffc107"; }
            else if (strength <= 75) { text = "Хороший"; color = "#17a2b8"; }
            else { text = "Відмінний"; color = "#28a745"; }

            strengthBar.style.width = strength + "%";
            strengthBar.style.backgroundColor = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
        }

        function checkPasswordMatch() {
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const errorElement = document.getElementById("passwordMatchError");

            if (confirmPassword.length > 0 && newPassword !== confirmPassword) {
                errorElement.style.display = "block";
                return false;
            } else {
                errorElement.style.display = "none";
                return true;
            }
        }

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const svg = button.querySelector("svg");
            
            if (input.type === "password") {
                input.type = "text";
                svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        async function resetPassword(event) {
            event.preventDefault();

            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const submitBtn = document.getElementById("submitBtn");
            const form = document.getElementById("resetPasswordForm");
            const successMessage = document.getElementById("successMessage");

            if (newPassword !== confirmPassword) {
                showNotification("Паролі не співпадають!", "error");
                return;
            }

            if (newPassword.length < 6) {
                showNotification("Пароль повинен містити мінімум 6 символів", "error");
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-small"></span> Обробка...';

                const res = await fetch(`${API_URL_GLOB}/reset-password?token=${token}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token, newPassword: newPassword })
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.message || "Помилка скидання пароля");

                form.style.display = "none";
                successMessage.style.display = "flex";

            } catch (error) {
                console.error("Помилка:", error);
                showNotification(error.message || "Помилка скидання пароля. Спробуйте ще раз.", "error");
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Скинути пароль';
            }
        }

        function showNotification(message, type) {
            const notification = document.createElement("div");
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.classList.add("show"), 10);
            setTimeout(() => {
                notification.classList.remove("show");
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
