<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обране</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/wishlist.css">
</head>
<body>
    <div class="container">
        <!-- Кнопка назад -->
        <div class="back-button-container">
            <button class="btn-back" onclick="goBack()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Назад
            </button>
        </div>

        <h1 class="page-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            Обране
        </h1>

        <!-- Завантаження -->
        <div id="loadingMessage" class="loading-message">
            <div class="spinner"></div>
            <p>Завантаження...</p>
        </div>

        <!-- Порожнє повідомлення -->
        <div id="emptyMessage" class="empty-message" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <h3>Ваш список обраного порожній</h3>
            <p>Додайте автомобілі в обране, щоб переглядати їх тут</p>
            <button class="btn-primary" onclick="goToHome()">Перейти до каталогу</button>
        </div>

        <!-- Сітка авто -->
        <div id="carsGrid" class="car-grid" style="display: none;"></div>
    </div>

    <script>
        const API_URL_GLOB = 'http://localhost:8080/api/v1';

        async function loadWishlist() {
            const token = sessionStorage.getItem('jwt');
            const loadingMsg = document.getElementById('loadingMessage');
            const emptyMsg = document.getElementById('emptyMessage');
            const carsGrid = document.getElementById('carsGrid');

            if (!token) {
                alert("Ви не авторизовані!");
                window.location.href = "login.html";
                return;
            }

            try {
                loadingMsg.style.display = 'flex';

                const res = await fetch(`${API_URL_GLOB}/getUserWishlist`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (!res.ok) throw new Error("Помилка завантаження обраного");

                const cars = await res.json();
                loadingMsg.style.display = 'none';

                if (cars.length === 0) {
                    emptyMsg.style.display = 'flex';
                    return;
                }

                carsGrid.style.display = 'grid';
                displayCars(cars);

            } catch (error) {
                console.error("Помилка:", error);
                loadingMsg.innerHTML = '<p style="color: #dc3545;">Помилка завантаження обраного</p>';
            }
        }

        function displayCars(cars) {
            const container = document.getElementById('carsGrid');
            
            cars.forEach(car => {
                const col = document.createElement('div');
                col.className = 'col';

                const card = document.createElement('div');
                card.className = 'card';

                const img = document.createElement('img');
                img.src = car.image;
                card.appendChild(img);

                const cardbody = document.createElement('div');
                cardbody.className = 'card-body';

                const name = document.createElement('h5');
                name.className = 'card-title';
                name.textContent = `${car.marka} ${car.model} (${car.year})`;
                cardbody.appendChild(name);

                const price = document.createElement('h6');
                price.className = 'card-subtitle mb-2 text-muted';
                price.textContent = `Ціна: ${car.price} $`;
                cardbody.appendChild(price);

                const condition = document.createElement('p');
                condition.className = 'card-text';
                condition.textContent = `Стан: ${car.condition}`;
                cardbody.appendChild(condition);

                const fuel = document.createElement('p');
                fuel.className = 'card-text';
                fuel.textContent = `Пальне: ${car.engine_type}`;
                cardbody.appendChild(fuel);

                const transmission = document.createElement('p');
                transmission.className = 'card-text';
                transmission.textContent = `КПП: ${car.transmission}`;
                cardbody.appendChild(transmission);

                card.appendChild(cardbody);

                const footer = document.createElement('div');
                footer.className = 'card-footer';

                const buttonInfo = document.createElement('button');
                buttonInfo.className = 'btn_info';
                buttonInfo.onclick = function() { viewDetail(car.id_cars); };
                buttonInfo.textContent = 'Детальніше';
                footer.appendChild(buttonInfo);

                const buttonRemove = document.createElement('button');
                buttonRemove.className = 'btn_remove';
                buttonRemove.onclick = function() { removeFromWishlist(car.id_cars); };
                buttonRemove.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    Видалити
                `;
                footer.appendChild(buttonRemove);

                card.appendChild(footer);
                col.appendChild(card);
                container.appendChild(col);
            });
        }

        async function removeFromWishlist(carId) {
            const token = sessionStorage.getItem('jwt');

            if (!confirm('Ви впевнені, що хочете видалити це авто з обраного?')) {
                return;
            }

            try {
                const res = await fetch(`${API_URL_GLOB}/delete-by-id_car/${carId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (!res.ok) throw new Error("Помилка видалення");

                showNotification("Автомобіль видалено з обраного", "success");
                
                // Перезавантажити список
                document.getElementById('carsGrid').innerHTML = '';
                loadWishlist();

            } catch (error) {
                console.error("Помилка:", error);
                showNotification("Помилка видалення з обраного", "error");
            }
        }

        function viewDetail(id) {
            window.location.href = `car_detail.html?carId=${id}`;
        }

        function goBack() {
            window.history.back();
        }

        function goToHome() {
            window.location.href = 'car_list.html';
        }

        function showNotification(message, type) {
            const notification = document.createElement("div");
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.classList.add("show"), 10);
            setTimeout(() => {
                notification.classList.remove("show");
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', loadWishlist);
    </script>
</body>
</html>
