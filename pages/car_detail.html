<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі авто</title>
    <link rel="stylesheet" href="../style/car-detail.css">
</head>
<body>
    <div class="container">
        <!-- Кнопка назад -->
        <div class="back-button-container">
            <button class="btn-back" onclick="goBack()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Назад
            </button>
        </div>

        <!-- Заголовок -->
        <div class="car-title">
            <h1 id="carMarka">Марка</h1>
            <h2 id="carModel">Модель</h2>
            <div class="car-price" id="carPriceTop"></div>
        </div>

        <!-- Слайдер фото -->
        <div class="car-slider">
            <button class="slider-btn prev" onclick="prevSlide()">‹</button>
            <img id="carImage" src="" alt="Car Image">
            <button class="slider-btn next" onclick="nextSlide()">›</button>
            <div class="slider-indicators" id="sliderIndicators"></div>
        </div>

        <!-- Характеристики -->
        <div class="specs-section">
            <h3 class="section-title">Основні характеристики</h3>
            <table class="specs-table">
                <tr>
                    <td>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                        Колір:
                    </td>
                    <td id="carColor"></td>
                </tr>
                <tr>
                    <td>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Рік:
                    </td>
                    <td id="carYear"></td>
                </tr>
                <tr>
                    <td>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        Тип двигуна:
                    </td>
                    <td id="carEngineType"></td>
                </tr>
                <tr>
                    <td>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline>
                        </svg>
                        Потужність двигуна:
                    </td>
                    <td id="carEnginePower"></td>
                </tr>
                <tr>
                    <td>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Кількість дверей:
                    </td>
                    <td id="carDoors"></td>
                </tr>
                <tr>
                    <td>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        Трансмісія:
                    </td>
                    <td id="carTransmission"></td>
                </tr>
                <tr>
                    <td>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
                        </svg>
                        Тип кузова:
                    </td>
                    <td id="carBodyType"></td>
                </tr>
                <tr>
                    <td>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        Стан:
                    </td>
                    <td id="carCondition"></td>
                </tr>
            </table>
        </div>

        <!-- Опис -->
        <div class="description-section">
            <h3 class="section-title">Опис</h3>
            <div class="description-text" id="carDescription"></div>
        </div>

        <!-- Кнопка замовлення -->
        <div class="order-section">
            <div class="order-card">
                <div class="order-info">
                    <h3>Готові придбати цей автомобіль?</h3>
                    <p class="order-price" id="carPriceBottom"></p>
                </div>
                <div id="orderButtonContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const carId = params.get("carId");
        const API_URL_GLOB = "http://localhost:8080/api/v1";

        let sliderPhotos = [];
        let currentSlide = 0;

        if (!carId) {
            alert("Не вказано ID авто!");
            window.location.href = "home.html";
        } else {
            fetch(`${API_URL_GLOB}/get-car-by/${carId}`)
            .then(res => {
                if (!res.ok) throw new Error("Помилка при отриманні даних авто");
                return res.json();
            })
            .then(car => {
                console.log(car.additionalPhotosArray);
                initSlider(car);
                
                // Заповнити дані
                document.getElementById("carMarka").textContent = car.marka;
                document.getElementById("carModel").textContent = car.model;
                document.getElementById("carPriceTop").textContent = car.price + " $";
                document.getElementById("carPriceBottom").textContent = car.price + " $";
                document.getElementById("carColor").textContent = car.color;
                document.getElementById("carYear").textContent = car.year;
                document.getElementById("carEngineType").textContent = car.engine_type;
                document.getElementById("carEnginePower").textContent = car.engine_power + " к.с.";
                document.getElementById("carDoors").textContent = car.doors;
                document.getElementById("carTransmission").textContent = car.transmission;
                document.getElementById("carBodyType").textContent = car.body_type;
                document.getElementById("carCondition").textContent = car.condition;
                document.getElementById("carDescription").textContent = car.description;

                // Кнопка замовлення
                const container = document.getElementById("orderButtonContainer");
                const button = document.createElement('button');
                button.className = 'btn-order';
                button.onclick = function() { getCarOptions(car.id_cars); };
                button.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    Оформити замовлення
                `;
                container.appendChild(button);
            })
            .catch(err => {
                console.error(err);
                alert("Не вдалося завантажити дані авто.");
            });
        }

        function initSlider(car) {
            // Головне фото
            if (car.image) {
                sliderPhotos.push(car.image);
            }

            // Додаткові фото
            if (car.additionalPhotosArray && car.additionalPhotosArray.trim() !== "") {
                const extraPhotos = car.additionalPhotosArray.split(";")
                    .map(p => p.trim())
                    .filter(p => p !== "");
                sliderPhotos.push(...extraPhotos);
            }

            // Якщо фото немає
            if (sliderPhotos.length === 0) {
                sliderPhotos.push("no-image.png");
            }

            // Створити індикатори
            const indicatorsContainer = document.getElementById("sliderIndicators");
            sliderPhotos.forEach((_, index) => {
                const dot = document.createElement("span");
                dot.className = "indicator-dot";
                if (index === 0) dot.classList.add("active");
                dot.onclick = () => goToSlide(index);
                indicatorsContainer.appendChild(dot);
            });

            showSlide();
        }

        function showSlide() {
            const img = document.getElementById("carImage");
            img.src = sliderPhotos[currentSlide];

            // Оновити індикатори
            const dots = document.querySelectorAll(".indicator-dot");
            dots.forEach((dot, index) => {
                dot.classList.toggle("active", index === currentSlide);
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % sliderPhotos.length;
            showSlide();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + sliderPhotos.length) % sliderPhotos.length;
            showSlide();
        }

        function goToSlide(index) {
            currentSlide = index;
            showSlide();
        }

        function goBack() {
            window.history.back();
        }

          function showNotification(message, type) {
    const notification = document.createElement("div");
    notification.className = `notification notification-${type}`;
    notification.textContent = message;
    document.body.appendChild(notification);

    setTimeout(() => notification.classList.add("show"), 10);
    setTimeout(() => {
        notification.classList.remove("show");
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

        function getCarOptions(id) {
            const token = sessionStorage.getItem('jwt');
            if(token){
            window.location.href = `order.html?carId=${id}`;
        }else{
                showNotification("Неавторизовані користувачі не можуть оформляти замовлення.","error")
        }

        }
    </script>
</body>
</html>
