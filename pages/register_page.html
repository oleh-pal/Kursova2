<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація акаунта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="../style/register_style.css">
   

</head>
<body>
    <div class="sectionq">
        <div class="conteiner_reg">
            <div class="rew">
                <form id="registerForm" method="post">
                    <h2>Заповніть форму, щоб створити акаунт</h2>
                    <hr />

                    <div class="form-floating mb-3">
                        <input type="text" id="username" name="username" class="form-control" required placeholder="Ваше ім’я">
                        <label for="username">Ім’я</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com">
                        <label for="email">Email</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" id="password" name="password" class="form-control" required placeholder="password">
                        <label for="password">Пароль</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required placeholder="confirm password">
                        <label for="confirmPassword">Підтвердіть пароль</label>
                    </div>

                    <button type="submit" class="register_btn">Створити акаунт</button>

                    <p id="registerMessage" class="text-danger" style="margin-top: 10px;"></p>

                    <div class="links">
                        <p><a href="login.html">Вже маєте акаунт? Увійдіть</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const user={
                name:document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,

            }
            const password=document.getElementById('password').value;
            const confirmPassword=document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                document.getElementById('registerMessage').textContent = 'Паролі не співпадають.';
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/v1/addUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user)
                });

                if (response.ok) {
                    alert('Реєстрація успішна! Перевірте свою пошту для підтвердження акаунта.');
                    window.location.href = 'login.html';
                } else {
                    const data = await response.json();
                    document.getElementById('registerMessage').textContent =
                        data.message || 'Помилка реєстрації. Перевірте дані.';
                }
            } catch (error) {
                document.getElementById('registerMessage').textContent = 'Помилка підключення до сервера.';
                console.error('Register error:', error);
            }
        });
    </script>
</body>
</html>
