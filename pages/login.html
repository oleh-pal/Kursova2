<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввійти в акаунт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/login_style.css">
   

</head>
<body >
        <div class="conteiner_reg">
            <div class="rew">
                <form id="loginForm" method="post">
                    <h2>Ввійдіть, щоб продовжити.</h2>
                    <hr />

                    <div class="form-floating mb-3">
                        <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com" />
                        <label for="email" class="form-label">Email</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" id="password" name="password" class="form-control" required placeholder="password" />
                        <label for="password" class="form-label">Пароль</label>
                    </div>

                    <div class="checkbox mb-3">
                        <label class="form-label">
                            <input type="checkbox" id="rememberMe" name="rememberMe" class="form-check-input" />
                            Запам'ятати мене
                        </label>
                    </div>

                    <div>
                        <button type="submit" class="login_btn">Ввійти</button>
                    </div>

                    <div class="links">
                        <p><a href="forgot-password.html">Забули пароль?</a></p>
                        <p><a href="register_page.html">Створити новий акаунт</a></p>
                    </div>
                </form>

                <p id="errorMessage" class="text-danger"></p>
            </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (event) {
    event.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const res = await fetch('http://localhost:8080/api/v1/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

        if (!res.ok) {
            document.getElementById('errorMessage').textContent = data.message || "Помилка входу";
            return;
        }

        sessionStorage.setItem("jwt", data.token);
        window.location.href = "home.html";
});
    </script>
</body>
</html>
