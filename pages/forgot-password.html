<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відновлення пароля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/forgot-password.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
            </svg>
        </div>

        <h2 class="page-title">Забули пароль?</h2>
        <p class="page-subtitle">Введіть вашу електронну пошту, і ми надішлемо вам посилання для відновлення пароля</p>

        <form id="forgotPasswordForm" onsubmit="sendResetLink(event)">
            <div class="form-group">
                <label for="email" class="form-label">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    Електронна пошта
                </label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="example@gmail.com"
                    required>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                Надіслати посилання
            </button>

            <div class="back-link">
                <a href="login.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Повернутися до входу
                </a>
            </div>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <p>Посилання для відновлення пароля надіслано на вашу електронну пошту. Перевірте вхідні повідомлення.</p>
        </div>
    </div>

    <script>
        const API_URL_GLOB = "http://localhost:8080/api/v1";

        async function sendResetLink(event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const submitBtn = document.getElementById("submitBtn");
            const form = document.getElementById("forgotPasswordForm");
            const successMessage = document.getElementById("successMessage");

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-small"></span> Відправка...';

                const res = await fetch(`${API_URL_GLOB}/forgot-password`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.message || "Помилка відправки");
                }

                // Приховати форму і показати повідомлення про успіх
                form.style.display = "none";
                successMessage.style.display = "flex";

                showNotification(data.message || "Якщо email існує — лист з інструкцією надіслано", "success");

            } catch (error) {
                console.error("Помилка:", error);
                showNotification(error.message || "Помилка відправки. Спробуйте ще раз.", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg> Надіслати посилання';
            }
        }

        function showNotification(message, type) {
            const notification = document.createElement("div");
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.classList.add("show"), 10);
            setTimeout(() => {
                notification.classList.remove("show");
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
