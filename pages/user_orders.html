<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої замовлення</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/user-orders.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h2 class="page-title">Мої замовлення</h2>
            <button type="button" class="btn-back" onclick="goBack()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Назад
            </button>
        </div>

        <div id="loadingMessage" class="loading-message">
            <div class="spinner"></div>
            <p>Завантаження замовлень...</p>
        </div>

        <div id="ordersContainer" class="orders-container" style="display: none;">
            <!-- Замовлення додаються динамічно -->
        </div>

        <div id="emptyMessage" class="empty-message" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <h3>У вас ще немає замовлень</h3>
            <p>Оберіть авто та зробіть своє перше замовлення</p>
        </div>
    </div>

    <!-- Модальне вікно підтвердження скасування -->
    <div id="cancelModal" class="modal">
        <div class="modal-content">
            <h3>Скасувати замовлення?</h3>
            <p>Ви дійсно хочете скасувати це замовлення? Цю дію неможливо буде скасувати.</p>
            <div class="modal-buttons">
                <button class="btn-danger" onclick="confirmCancel()">Так, скасувати</button>
                <button class="btn-secondary" onclick="closeModal()">Ні, залишити</button>
            </div>
        </div>
    </div>

    <script>
        const token = sessionStorage.getItem("jwt");
        const API_URL_GLOB = "http://localhost:8080/api/v1";
        let currentUser = null;
        let selectedOrderId = null;

        if (!token) {
            alert("Ви не авторизовані!");
            window.location.href = "home.html";
        }

        // Завантаження замовлень користувача
        async function loadUserOrders() {
            try {
                const loadingMsg = document.getElementById("loadingMessage");
                const ordersContainer = document.getElementById("ordersContainer");
                const emptyMsg = document.getElementById("emptyMessage");

                loadingMsg.style.display = "flex";

                // Отримати поточного користувача
                const resUser = await fetch(`${API_URL_GLOB}/currentUser`, {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (!resUser.ok) throw new Error("Помилка отримання даних користувача");

                currentUser = await resUser.json();

                // Отримати замовлення користувача
                const resOrders = await fetch(`${API_URL_GLOB}/get-order-by-user_id/${currentUser.id_users}`, {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (!resOrders.ok) throw new Error("Помилка завантаження замовлень");

                const orders = await resOrders.json();
               
                loadingMsg.style.display = "none";

                if (orders.length === 0) {
                    emptyMsg.style.display = "flex";
                    return;
                }

                ordersContainer.style.display = "block";

                // Відобразити кожне замовлення
                for (const order of orders) {
                    await renderOrder(order);
                }

            } catch (error) {
                console.error("Помилка:", error);
                document.getElementById("loadingMessage").innerHTML = 
                    '<p style="color: #dc3545;">Помилка завантаження замовлень</p>';
            }
        }

        // Відображення одного замовлення
        async function renderOrder(order) {
            try {
                // Завантажити дані про авто та опції
                const [car, options] = await Promise.all([
                    fetch(`${API_URL_GLOB}/get-car-by/${order.id_car}`, {
                        headers: { "Authorization": "Bearer " + token }
                    }).then(res => res.json()),

                    fetch(`${API_URL_GLOB}/get-orders-option-byOrderId/${order.id_order}`, {
                        headers: { "Authorization": "Bearer " + token }
                    }).then(res => res.json()).catch(() => [])
                ]);

                const optionsArray = Array.isArray(options) ? options : [];
                const optionsText = optionsArray.length > 0 
                    ? optionsArray.map(o => o.order_name).join(", ")
                    : "Без додаткових опцій";

                // Статус українською
                const statusMap = {
                    'pending': 'В обробці',
                    'confirmed': 'Підтверджено',
                    'processing': 'Виконується',
                    'shipped': 'Відправлено',
                    'delivered': 'Доставлено',
                    'cancelled': 'Скасовано',
                    'Скасовано замовником': 'Скасовано замовником'
                };

                const statusText = statusMap[order.status] || order.status;
                const canCancel = !['cancelled', 'Скасовано замовником', 'delivered'].includes(order.status);

                // Створити картку замовлення
                const orderCard = document.createElement("div");
                orderCard.className = "order-card";
                orderCard.innerHTML = `
                    <div class="order-header">
                        <div class="order-number">Замовлення №${order.id_order.split('-')[0]}</div>
                        <div class="order-status status-${order.status.toLowerCase().replace(' ', '-')}">
                            ${statusText}
                        </div>
                    </div>

                    <div class="order-body">
                        <div class="car-info">
                            <img src="${car.image}" alt="${car.marka} ${car.model}" class="car-image">
                            <div class="car-details">
                                <h3 class="car-name">${car.marka} ${car.model}</h3>
                                <p class="car-price">${order.total_price} $</p>
                            </div>
                        </div>

                        <div class="order-info">
                            <div class="info-row">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span>Дата замовлення: ${formatDate(order.date)}</span>
                            </div>
                            <div class="info-row">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                <span>Опції: ${optionsText}</span>
                            </div>
                        </div>
                    </div>

                    <div class="order-footer">
                        ${canCancel ? `
                            <button class="btn-cancel" onclick="openCancelModal('${order.id_order}')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                                Скасувати замовлення
                            </button>
                        ` : `
                            <div class="order-final-status">
                                ${order.status === 'delivered' ? 'Замовлення виконано' : 'Замовлення скасовано'}
                            </div>
                        `}
                    </div>
                `;

                document.getElementById("ordersContainer").appendChild(orderCard);

            } catch (error) {
                console.error("Помилка відображення замовлення:", error);
            }
        }

        // Відкрити модальне вікно для підтвердження скасування
        function openCancelModal(orderId) {
            selectedOrderId = orderId;
            document.getElementById("cancelModal").style.display = "flex";
        }

        // Закрити модальне вікно
        function closeModal() {
            document.getElementById("cancelModal").style.display = "none";
            selectedOrderId = null;
        }
            function formatDate(dateStr) {
    if (!dateStr) return "—";
    const date = new Date(dateStr);
    return date.toLocaleString("uk-UA", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    });
}
        // Підтвердити скасування замовлення
        async function confirmCancel() {
            if (!selectedOrderId) return;

            try {
                const res = await fetch(`${API_URL_GLOB}/update-status/${selectedOrderId}`, {
                    method: "PUT",
                    headers: {
                        "Authorization": "Bearer " + token,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        status: "Скасовано замовником"
                    })
                });

                if (!res.ok) throw new Error("Помилка скасування замовлення");

                showNotification("Замовлення успішно скасовано", "success");
                
                closeModal();
                
                // Перезавантажити сторінку
                setTimeout(() => {
                    window.location.reload();
                }, 1000);

            } catch (error) {
                console.error("Помилка:", error);
                showNotification("Помилка скасування замовлення", "error");
            }
        }

        // Повернутися назад
        function goBack() {
            window.history.back();
        }

        // Показати сповіщення
        function showNotification(message, type) {
            const notification = document.createElement("div");
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.classList.add("show"), 10);
            setTimeout(() => {
                notification.classList.remove("show");
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        document.addEventListener("DOMContentLoaded", loadUserOrders);
    </script>
</body>
</html>
