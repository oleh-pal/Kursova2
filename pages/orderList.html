<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список замовлень</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/orderList.css">
</head>
<body>
<div class="container">
    <h2 class="page-title">Список замовлень</h2>

    <div class="table-wrapper">
        <table id="orderTable" class="orders-table">
            <thead>
                <tr>
                    <th>№</th>
                    <th>Замовник</th>
                    <th>Авто</th>
                    <th>Дата замовлення</th>
                    <th>Опції</th>
                    <th>Ціна</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="loadingMessage" class="loading-message">
        <div class="spinner"></div>
        <p>Завантаження замовлень...</p>
    </div>

    <div id="emptyMessage" class="empty-message" style="display: none;">
        <p>Немає жодного замовлення</p>
    </div>
</div>

<script>
const token = sessionStorage.getItem("jwt");
const API_URL_GLOB = "http://localhost:8080/api/v1";

if (!token) {
    alert("Ви не авторизовані!");
    window.location.href = "home.html";
}

async function loadOrders() {
    const loadingMsg = document.getElementById("loadingMessage");
    const emptyMsg = document.getElementById("emptyMessage");

    try {
        loadingMsg.style.display = "flex";

        const res = await fetch(`${API_URL_GLOB}/get-all-orders`, {
            headers: { "Authorization": "Bearer " + token }
        });

        if (!res.ok) throw new Error("Помилка завантаження замовлень");

        const orders = await res.json();
        loadingMsg.style.display = "none";

        if (!orders.length) {
            emptyMsg.style.display = "block";
            return;
        }

        for (const order of orders) {
            await renderOrder(order);
        }
    } catch (err) {
        console.error("Помилка:", err);
        loadingMsg.innerHTML = '<p style="color: #dc3545;">Помилка завантаження замовлень</p>';
    }
}

async function renderOrder(order) {
    try {
        const [userResp, car, options] = await Promise.all([
            fetch(`${API_URL_GLOB}/username-by/${order.id_user}`, {
                headers: { "Authorization": "Bearer " + token }
            }),
            fetch(`${API_URL_GLOB}/get-car-by/${order.id_car}`, {
                headers: { "Authorization": "Bearer " + token }
            }),
            fetch(`${API_URL_GLOB}/get-orders-option-byOrderId/${order.id_order}`, {
                headers: { "Authorization": "Bearer " + token }
            })
        ]);

        const userData = await userResp.json();
        const userName = userData.name;
        const Car = await car.json();
        const optionsArray = await options.json();
        const optionsText = Array.isArray(optionsArray) && optionsArray.length
            ? optionsArray.map(o => o.order_name).join(", ")
            : "Без опцій";
            
        const statusMap = {
            'pending': 'В обробці',
            'confirmed': 'Підтверджено',
            'processing': 'Виконується',
            'shipped': 'Відправлено',
            'delivered': 'Доставлено',
            'cancelled': 'Скасовано',
            'Скасовано замовником': 'Скасовано замовником'
        };

        const statusText = statusMap[order.status] || order.status;
        const isCancelledByUser = order.status === 'Скасовано замовником';
        const isDelivered=order.status==="delivered";

        const row = document.createElement("tr");
        
        // Якщо замовлення скасовано замовником - показати тільки статус без можливості зміни
        if (isCancelledByUser || isDelivered) {
            row.innerHTML = `
                <td>${order.id_order}</td>
                <td>${userName}</td>
                <td>${Car.marka} ${Car.model}</td>
                <td>${order.date ? new Date(order.date).toLocaleDateString('uk-UA') : "—"}</td>
                <td class="options-cell">${optionsText}</td>
                <td class="price-cell">${order.total_price} $</td>
                <td>
                    <div class="status-display-only">
                        <div class="status-badge status-cancelled-user">${statusText}</div>
                        <small class="status-note">Не можна змінити</small>
                    </div>
                </td>
            `;
        } else {
            // Для інших статусів - показати поточний статус і селект для зміни
            row.innerHTML = `
                <td>${order.id_order}</td>
                <td>${userName}</td>
                <td>${Car.marka} ${Car.model}</td>
                <td>${order.date ? new Date(order.date).toLocaleDateString('uk-UA') : "—"}</td>
                <td class="options-cell">${optionsText}</td>
                <td class="price-cell">${order.total_price} $</td>
                <td>
                    <div class="status-container">
                        <div class="status-badge status-${order.status}">${statusText}</div>
                        <select class="status-select" data-order-id="${order.id_order}">
                            <option value="">Змінити статус...</option>
                            <option value="pending" ${order.status === 'pending' ? 'disabled' : ''}>В обробці</option>
                            <option value="confirmed" ${order.status === 'confirmed' ? 'disabled' : ''}>Підтверджено</option>
                            <option value="processing" ${order.status === 'processing' ? 'disabled' : ''}>Виконується</option>
                            <option value="shipped" ${order.status === 'shipped' ? 'disabled' : ''}>Відправлено</option>
                            <option value="delivered" ${order.status === 'delivered' ? 'disabled' : ''}>Доставлено</option>
                            <option value="cancelled" ${order.status === 'cancelled' ? 'disabled' : ''}>Скасовано</option>
                        </select>
                    </div>
                </td>
            `;
        }

        document.querySelector("#orderTable tbody").appendChild(row);

        // Підписка на зміну статусу (тільки якщо це не скасоване замовником)
        if (!isCancelledByUser && !isDelivered) {
            const selectElement = row.querySelector("select.status-select");
            selectElement.addEventListener("change", async () => {
                const newStatus = selectElement.value;
                if (newStatus) {
                    await updateStatus(order.id_order, newStatus, row);
                    selectElement.value = ""; // Скинути селект
                }
            });
        }

    } catch (e) {
        console.error("Помилка при завантаженні даних замовлення:", e);
    }
}

async function updateStatus(orderId, newStatus, row) {
    try {
        const res = await fetch(`${API_URL_GLOB}/update-status/${orderId}`, {
            method: "PUT",
            headers: {
                "Authorization": "Bearer " + token,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ status: newStatus })
        });

        if (!res.ok) throw new Error("Помилка оновлення статусу");

        // Оновити відображення статусу
        const statusMap = {
            'pending': 'В обробці',
            'confirmed': 'Підтверджено',
            'processing': 'Виконується',
            'shipped': 'Відправлено',
            'delivered': 'Доставлено',
            'cancelled': 'Скасовано'
        };

        const statusBadge = row.querySelector(".status-badge");
        statusBadge.textContent = statusMap[newStatus];
        statusBadge.className = `status-badge status-${newStatus}`;

        // Оновити disabled стан опцій
        const selectElement = row.querySelector(".status-select");
        const options = selectElement.querySelectorAll("option");
        options.forEach(option => {
            if (option.value === newStatus) {
                option.disabled = true;
            } else if (option.value !== "") {
                option.disabled = false;
            }
        });

        showNotification("Статус успішно оновлено!", "success");

    } catch (err) {
        console.error("Помилка оновлення статусу:", err);
        showNotification("Помилка оновлення статусу", "error");
    }
}

function showNotification(message, type) {
    const notification = document.createElement("div");
    notification.className = `notification notification-${type}`;
    notification.textContent = message;
    document.body.appendChild(notification);

    setTimeout(() => notification.classList.add("show"), 10);
    setTimeout(() => {
        notification.classList.remove("show");
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

document.addEventListener("DOMContentLoaded", loadOrders);
</script>
</body>
</html>
